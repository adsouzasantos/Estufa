<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login • Supervisório Equipe 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="usuarios.js"></script> </head>
<body class="h-screen flex items-center justify-center" style="background: #0B1320;">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-gray-900">Sign In</h2>
            <p class="text-gray-500 text-sm mt-2">Acesse o Supervisório Industrial</p>
        </div>
        
        <div id="erro" class="hidden mb-4 p-3 bg-red-100 text-red-700 text-sm rounded-lg border border-red-200 text-center">
            Usuário ou senha incorretos.
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome de Usuário</label>
                <input id="user" type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition-all" placeholder="Digite seu nome">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input id="pass" type="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-[#0F7B3B] hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Entrar no Sistema
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userIn = document.getElementById('user').value;
            const passIn = document.getElementById('pass').value;

            // Busca no "banco de dados" (usuarios.js)
            const usuarioValido = usuariosDB.find(u => u.usuario === userIn && u.senha === passIn);

            if (usuarioValido) {
                // Salva o nome do usuário na sessão do navegador
                localStorage.setItem('usuarioLogado', usuarioValido.usuario);
                // Redireciona para o dashboard
                window.location.href = "index.html"; 
            } else {
                document.getElementById('erro').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
